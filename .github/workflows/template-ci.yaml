name: MediMesh CI Template

run-name: "${{ inputs.service_name }} — ${{ github.event.head_commit.message }} (${{ github.sha }})"

on:
  workflow_call:
    inputs:
      service_name:
        description: "Human-readable service name (e.g. medimesh-auth)"
        required: true
        type: string
      service_path:
        description: "Path to the service directory relative to repo root"
        required: true
        type: string
      docker_image_name:
        description: "Docker Hub image name (e.g. medimesh_medimesh-auth)"
        required: true
        type: string
      sonar_project_key:
        description: "SonarQube project key for this service"
        required: true
        type: string
      node_version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"

    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      SNYK_TOKEN:
        required: true
      SONARQUBE_TOKEN:
        required: true
      SONARQUBE_URL:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      ALERT_EMAIL:
        required: true


jobs:
  # ① SonarQube — Code Quality Scan (RUNS FIRST)
  sonarqube:
    name: "① SonarQube — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Analysis
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.service_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_URL }}

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ MediMesh CI Failed — SonarQube (${{ inputs.service_name }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
            ❌ SonarQube code quality scan FAILED for: ${{ inputs.service_name }}

            Path   : ${{ inputs.service_path }}
            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}



  # ② NPM Build — Install & Build Dependencies 
  build:
    name: "② Build — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: sonarqube
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: "${{ inputs.service_path }}/package.json"

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Build Project
        run: npm run build --if-present

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: " MediMesh CI Failed — Build (${{ inputs.service_name }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
             NPM build FAILED for service: ${{ inputs.service_name }}

             Path   : ${{ inputs.service_path }}
             Branch : ${{ github.ref_name }}
             Commit : ${{ github.sha }}
             Author : ${{ github.actor }}

             Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}


  
  #  Snyk — Security Vulnerability Scan (continue-on-error)

  snyk:
    name: "③ Snyk — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: "${{ inputs.service_path }}/package.json"

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Snyk Security Scan
        run: snyk test --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk Report to HTML
        run: |
          if [ -f snyk-report.json ]; then
            snyk-to-html -i snyk-report.json -o snyk-report.html
            echo " Snyk HTML report generated"
          else
            echo " No Snyk JSON report found, skipping HTML conversion"
          fi

      - name: Upload Snyk HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ inputs.service_name }}
          path: |
            ${{ inputs.service_path }}/snyk-report.html
            ${{ inputs.service_path }}/snyk-report.json
          retention-days: 14
          if-no-files-found: ignore


  docker:
    name: "④⑤⑥ Docker — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: [build, snyk]
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Semantic Versioning ─────────────────────────────────────
      - name: Determine Semantic Version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: "${{ inputs.service_name }}/v"
          default_bump: patch
          initial_version: "1.0.0"
          custom_release_rules: "feature:minor:Features,breaking:major:Breaking Changes"
          dry_run: ${{ github.event_name == 'pull_request' }}

      # ─── Docker Setup ───────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Image Tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${{ steps.version.outputs.new_version }}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker_image_name }}"

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag_version=${IMAGE}:v${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_version_sha=${IMAGE}:v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=${IMAGE}:latest" >> $GITHUB_OUTPUT
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

          echo "════════════════════════════════════════════════════"
          echo " Image   : ${IMAGE}"
          echo "  Version : v${VERSION}"
          echo "  SHA Tag : v${VERSION}-${SHORT_SHA}"
          echo "  Latest  : latest"
          echo "════════════════════════════════════════════════════"

      # ─── Step 4: Docker Build ────────────────────────────────────
      - name: " Build Docker Image"
        run: |
          docker build \
            -t ${{ steps.meta.outputs.tag_version }} \
            -t ${{ steps.meta.outputs.tag_version_sha }} \
            -t ${{ steps.meta.outputs.tag_latest }} \
            -f ${{ inputs.service_path }}/Dockerfile \
            ${{ inputs.service_path }}

      # ─── Step 5: Trivy Scan (continue-on-error) ─────────────────
      - name: "⑤ Trivy — Container Image Scan"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.meta.outputs.tag_version }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # ─── Step 6: Docker Push (LAST STEP) ────────────────────────
      - name: "⑥ Push Docker Image to DockerHub"
        if: github.event_name != 'pull_request'
        run: |
          echo " Pushing Docker images with semantic version tags..."
          docker push ${{ steps.meta.outputs.tag_version }}
          docker push ${{ steps.meta.outputs.tag_version_sha }}
          docker push ${{ steps.meta.outputs.tag_latest }}
          echo " All tags pushed successfully"

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: " MediMesh CI Failed — Docker (${{ inputs.service_name }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
             Docker build/push FAILED for: ${{ inputs.service_name }}

             Image  : ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker_image_name }}
             Branch : ${{ github.ref_name }}
             Commit : ${{ github.sha }}
             Author : ${{ github.actor }}

             Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  # Update Helm values with new image tag
  update-helm-values:
    name: "⑦ Update Helm Values"
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Update Helm values.yaml with new image tag
        run: |
          NEW_IMAGE_TAG="${{ needs.docker.outputs.version }}"
          HELM_VALUES_FILE="helm/medimesh/values.yaml"
          
          # Update the global image tag
          sed -i "s/imageTag: .*/imageTag: \"${NEW_IMAGE_TAG}\"/" "$HELM_VALUES_FILE"
          
          # Update ambulance-specific tag
          sed -i "s|bharath44623/medimesh_medimesh-ambulance.*|bharath44623/medimesh_medimesh-ambulance|g" "$HELM_VALUES_FILE"
          sed -i "/repository: bharath44623\/medimesh_medimesh-ambulance/a\\    tag: \"${NEW_IMAGE_TAG}\"" "$HELM_VALUES_FILE"
          
          echo "✅ Updated Helm values with tag: ${NEW_IMAGE_TAG}"
          cat "$HELM_VALUES_FILE" | grep -A 2 "imageTag:"
  
      - name: Commit and push changes to Git
        run: |
          git config --local user.email "github-action@medimesh.local"
          git config --local user.name "MediMesh CI Bot"
          git add helm/medimesh/values.yaml
          git commit -m "chore(helm): update image tag to ${{ needs.docker.outputs.version }} [skip ci]" || echo "No changes to commit"
          git push origin main || true
  
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ MediMesh CD Failed — Helm Update (${{ inputs.service_name }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI/CD Pipeline
          body: |
            Helm values update FAILED for: ${{ inputs.service_name }}
            
            Version : ${{ needs.docker.outputs.version }}
            Commit  : ${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  
  # Success Notification
  
  notify-success:
    name: " Success — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: [sonarqube, build, snyk, docker, update-helm-values]
    if: success() && github.event_name != 'pull_request'
    steps:
      - name: Send Success Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: " MediMesh CI Passed — ${{ inputs.service_name }} (${{ needs.docker.outputs.version }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
            ═══════════════════════════════════════════════════════════
              MediMesh CI Pipeline — SUCCESS
            ════════════════════════════════════════════════════════════

             Service : ${{ inputs.service_name }}
              Version : ${{ needs.docker.outputs.version }}
             Branch  : ${{ github.ref_name }}
             Commit  : ${{ github.sha }}
             Author  : ${{ github.actor }}

            ────────────────────────────────────────────────────────────
              Pipeline Results:
            ────────────────────────────────────────────────────────────
               SonarQube  — Code quality analysis
               NPM Build  — Dependencies installed & built
               Snyk       — Dependency vulnerability scan
               Docker     — Image built & pushed
               Trivy      — Container image scanned

            ────────────────────────────────────────────────────────────
             Docker Image Tags:
            ────────────────────────────────────────────────────────────
              → ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker_image_name }}:${{ needs.docker.outputs.version }}
              → ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker_image_name }}:latest

             Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ════════════════════════════════════════════════════════════
